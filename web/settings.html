<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Todo Memory – Account settings and preferences.">
    <title>Todo Memory – Settings</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="settings-page">
        <!-- Top bar -->
        <nav class="settings-nav">
            <a href="app.html" class="settings-nav__brand">TODO MEMORY</a>
            <a href="app.html" class="settings-nav__back">← Back to App</a>
        </nav>

        <div class="settings-container">
            <h1 class="settings-title">⚙️ Settings</h1>

            <!-- Account Info -->
            <div class="settings-section">
                <div class="settings-section__title">Account</div>
                <div class="settings-info">
                    <span class="settings-info__label">Username</span>
                    <span class="settings-info__value" id="settings-username">—</span>
                </div>
                <div class="settings-info">
                    <span class="settings-info__label">Member since</span>
                    <span class="settings-info__value" id="settings-joined">—</span>
                </div>

                <hr style="border:0; border-top:1px solid var(--border-color); margin:20px 0;">

                <div class="settings-section__title">Change Username</div>
                <div class="form-group settings-form-group">
                    <label class="form-label" for="new-username">New Username</label>
                    <input type="text" class="input" id="new-username" placeholder="Enter new username">
                </div>
                <button class="btn btn--primary" onclick="changeUsername()">Update Username</button>
            </div>

            <!-- Server Settings -->
            <div class="settings-section">
                <div class="settings-section__title">Server Connection</div>
                <div class="form-group settings-form-group">
                    <label class="form-label" for="settings-server-url">Server URL</label>
                    <input type="text" class="input" id="settings-server-url" placeholder="http://192.168.1.133:3000">
                </div>
                <div class="settings-button-group">
                    <button class="btn btn--primary settings-button-flex" id="settings-test-btn"
                        onclick="testServerConnection()">Save & Test</button>
                </div>
                <div class="alert alert--error hidden settings-alert" id="settings-server-error"></div>
                <div class="alert alert--success hidden settings-alert" id="settings-server-success"></div>
            </div>

            <!-- Change Password -->
            <div class="settings-section">
                <div class="settings-section__title">Change Password</div>
                <div class="form-group settings-form-group-small">
                    <label class="form-label" for="current-password">Current Password</label>
                    <input type="password" class="input" id="current-password" placeholder="Enter current password">
                </div>
                <div class="form-group settings-form-group-small">
                    <label class="form-label" for="new-password">New Password</label>
                    <input type="password" class="input" id="new-password" placeholder="Enter new password">
                </div>
                <div class="form-group settings-form-group">
                    <label class="form-label" for="confirm-new-password">Confirm New Password</label>
                    <input type="password" class="input" id="confirm-new-password" placeholder="Confirm new password">
                </div>
                <button class="btn btn--primary" id="change-pw-btn" onclick="changePassword()">Change Password</button>
                <div class="alert alert--error hidden settings-alert" id="pw-error"></div>
                <div class="alert alert--success hidden settings-alert" id="pw-success"></div>
            </div>

            <!-- Appearance -->
            <div class="settings-section">
                <div class="settings-section__title">Appearance</div>
                <div class="settings-info">
                    <span class="settings-info__label">Theme</span>
                    <span class="settings-info__value">🌙 Dark (Futuristic)</span>
                </div>
                <p class="settings-appearance-desc">More themes coming soon.</p>
            </div>

            <!-- Danger Zone -->
            <div class="settings-section danger-zone">
                <div class="settings-section__title">⚠️ Danger Zone</div>
                <p class="settings-danger-desc">
                    Permanently delete your account and all associated data. This action cannot be undone.
                </p>
                <div class="form-group settings-form-group">
                    <label class="form-label" for="delete-confirm-password">Enter Password to Confirm</label>
                    <input type="password" class="input" id="delete-confirm-password"
                        placeholder="Confirm your password">
                </div>
                <button class="btn btn--danger" onclick="deleteAccount()">Delete My Account</button>
            </div>

            <!-- Logout -->
            <div class="settings-logout-wrapper">
                <button class="btn btn--secondary settings-logout-btn" onclick="logoutFromSettings()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="api.js"></script>
    <script>
        // ── Auth guard ──
        (async function init() {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }
            try {
                const data = await authAPI.me();
                document.getElementById('settings-username').textContent = data.user.username;
                document.getElementById('settings-joined').textContent = new Date(data.user.created_at).toLocaleDateString();
            } catch {
                authAPI.logout();
                window.location.href = 'login.html';
                return;
            }
            document.getElementById('settings-server-url').value = getApiUrl();
        })();

        // ── Server URL ──
        async function testServerConnection() {
            const errEl = document.getElementById('settings-server-error');
            const okEl = document.getElementById('settings-server-success');
            errEl.classList.add('hidden');
            okEl.classList.add('hidden');

            const btn = document.getElementById('settings-test-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';

            let url = document.getElementById('settings-server-url').value.trim();
            if (url.endsWith('/')) url = url.slice(0, -1);

            // Smart protocol autocomplete (required for fetch)
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                // Use http for localhost/IPs, https for everything else (domains)
                const isIP = /^(\d{1,3}\.){3}\d{1,3}/.test(url) || url.startsWith('localhost');
                url = isIP ? `http://${url}` : `https://${url}`;
            }

            // Only auto-add :3000 if it's a local IP and explicitly has no port
            if ((url.includes('localhost') || /^http:\/\/(\d{1,3}\.){3}\d{1,3}/.test(url)) && !/:\d+$/.test(url)) {
                url = `${url}:3000`;
            }
            document.getElementById('settings-server-url').value = url;
            setApiUrl(url);

            const result = await healthCheck();
            btn.disabled = false;
            btn.textContent = 'Save & Test';

            if (result.ok) {
                okEl.classList.remove('hidden');
                okEl.textContent = '✅ Connected successfully!';
                showToast('Server URL saved!');
            } else {
                errEl.classList.remove('hidden');
                errEl.textContent = `Connection failed. Check that the backend is running at ${url}`;
            }
        }

        // ── Change Password ──
        async function changePassword() {
            const errEl = document.getElementById('pw-error');
            const okEl = document.getElementById('pw-success');
            errEl.classList.add('hidden');
            okEl.classList.add('hidden');

            const currentPw = document.getElementById('current-password').value;
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-new-password').value;

            if (!currentPw || !newPw) {
                errEl.classList.remove('hidden');
                errEl.textContent = 'Please fill in all fields.';
                return;
            }

            if (newPw.length < 6) {
                errEl.classList.remove('hidden');
                errEl.textContent = 'New password must be at least 6 characters.';
                return;
            }

            if (newPw !== confirmPw) {
                errEl.classList.remove('hidden');
                errEl.textContent = 'New passwords do not match.';
                return;
            }

            const btn = document.getElementById('change-pw-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';

            try {
                await authAPI.changePassword(currentPw, newPw);
                okEl.classList.remove('hidden');
                okEl.textContent = '✅ Password changed successfully!';
                document.getElementById('current-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-new-password').value = '';
                showToast('Password changed!');
            } catch (err) {
                errEl.classList.remove('hidden');
                errEl.textContent = err.message || 'Failed to change password.';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Change Password';
            }
        }

        // ── Change Username ──
        async function changeUsername() {
            const newUsername = document.getElementById('new-username').value.trim();
            if (!newUsername) {
                showToast('Please enter a new username.', 'warning');
                return;
            }

            try {
                await authAPI.changeUsername(newUsername);
                document.getElementById('settings-username').textContent = newUsername;
                document.getElementById('new-username').value = '';
                showToast('Username updated successfully!');
            } catch (err) {
                showToast(err.message || 'Failed to update username.', 'error');
            }
        }

        // ── Delete Account ──
        async function deleteAccount() {
            const password = document.getElementById('delete-confirm-password').value;
            if (!password) {
                showToast('Please enter your password to confirm deletion.', 'warning');
                return;
            }

            const confirmed = confirm('⚠️ Are you ABSOLUTELY sure?\n\nThis will permanently delete your account and ALL your tasks, API keys, and data.\n\nThis action CANNOT be undone.');
            if (!confirmed) return;

            try {
                await authAPI.deleteAccount(password);
                authAPI.logout();
                showToast('Account deleted.', 'success');
                setTimeout(() => { window.location.href = 'login.html'; }, 1500);
            } catch (err) {
                showToast(err.message || 'Failed to delete account.', 'error');
            }
        }

        // ── Logout ──
        function logoutFromSettings() {
            authAPI.logout();
            window.location.href = 'login.html';
        }
    </script>

</body>

</html>

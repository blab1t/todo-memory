<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Todo Memory – Your second brain, everywhere.">
    <title>Todo Memory</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="auth-page">
        <div class="spinner"></div>
    </div>
    <script src="api.js"></script>
    <script>
        // Smart redirect: if logged in go to app, otherwise go to login
        (async function () {
            if (isAuthenticated()) {
                try {
                    await authAPI.me();
                    window.location.replace('app.html');
                    return;
                } catch { }
            }
            window.location.replace('login.html');
        })();
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Todo Memory – Your second brain, everywhere. Login to manage your tasks.">
    <title>Todo Memory – Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="auth-page" id="auth-page">
        <div class="auth-card" id="auth-card">
            <!-- Logo -->
            <div class="auth-card__logo">
                <h1>TODO MEMORY</h1>
                <p>Your second brain, everywhere</p>
            </div>

            <!-- Auth Form -->
            <form class="auth-card__form" id="auth-form">
                <!-- Error alert -->
                <div class="alert alert--error hidden" id="auth-error"></div>

                <!-- Connection status -->
                <div class="alert alert--success hidden" id="conn-success"></div>

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" class="input" id="username" placeholder="Enter your username" required
                        autocomplete="username">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" class="input" id="password" placeholder="Enter your password" required
                        autocomplete="current-password">
                </div>

                <!-- Confirm password (register only) -->
                <div class="form-group hidden" id="confirm-group">
                    <label class="form-label" for="confirm-password">Confirm Password</label>
                    <input type="password" class="input" id="confirm-password" placeholder="Confirm your password"
                        autocomplete="new-password">
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn--primary btn--full" id="auth-submit">Sign In</button>
            </form>

            <!-- Mode toggle -->
            <div class="auth-card__footer" id="auth-footer">
                <span id="toggle-text">Don't have an account?</span>
                <button class="auth-card__link" id="auth-toggle" type="button">Sign up</button>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="api.js"></script>
    <script>
        // ── State ──
        let isLoginMode = true;
        let isConnected = false;

        // ── Elements ──
        const authForm = document.getElementById('auth-form');
        const authError = document.getElementById('auth-error');
        const connSuccess = document.getElementById('conn-success');
        const confirmGroup = document.getElementById('confirm-group');
        const authSubmit = document.getElementById('auth-submit');
        const authToggle = document.getElementById('auth-toggle');
        const toggleText = document.getElementById('toggle-text');

        // ── Init ──
        (async function init() {
            // If already authenticated, redirect
            if (isAuthenticated()) {
                try {
                    await authAPI.me();
                    window.location.href = 'app.html';
                    return;
                } catch {
                    authAPI.logout();
                }
            }

            await checkConnection();
        })();

        async function checkConnection() {
            const result = await healthCheck();
            isConnected = result.ok;
            updateConnectionUI();
        }

        function updateConnectionUI() {
            if (isConnected) {
                connSuccess.classList.remove('hidden');
                connSuccess.textContent = `✅ Connected to Todo Memory`;
            } else {
                connSuccess.classList.add('hidden');
            }
        }

        // ── Mode toggle ──
        authToggle.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authError.classList.add('hidden');

            if (isLoginMode) {
                confirmGroup.classList.add('hidden');
                authSubmit.textContent = 'Sign In';
                toggleText.textContent = "Don't have an account?";
                authToggle.textContent = 'Sign up';
            } else {
                confirmGroup.classList.remove('hidden');
                authSubmit.textContent = 'Create Account';
                toggleText.textContent = 'Already have an account?';
                authToggle.textContent = 'Sign in';
            }
        });

        // ── Form submit ──
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            authError.classList.add('hidden');

            if (!isConnected) {
                showError('Cannot connect to server. Please try again later.');
                return;
            }

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!isLoginMode) {
                const confirm = document.getElementById('confirm-password').value;
                if (password !== confirm) {
                    showError('Passwords do not match');
                    return;
                }
            }

            authSubmit.disabled = true;
            authSubmit.innerHTML = '<div class="spinner"></div>';

            try {
                if (isLoginMode) {
                    await authAPI.login(username, password);
                } else {
                    await authAPI.register(username, password);
                }
                window.location.href = 'app.html';
            } catch (err) {
                showError(err.message || 'An error occurred');
                authSubmit.disabled = false;
                authSubmit.textContent = isLoginMode ? 'Sign In' : 'Create Account';
            }
        });

        function showError(msg) {
            authError.classList.remove('hidden');
            authError.textContent = msg;
        }
    </script>

</body>

</html>
